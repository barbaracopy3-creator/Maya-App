  <style>
    .tabs {
      display: flex;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      background: white;
      padding: 0 24px;
    }

    .tab {
      font-size: 13px;
      font-weight: 500;
      color: #8A8A8E;
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -0.5px;
    }

    .tab.active {
      color: #1C1C1E;
      border-bottom-color: #A0A0A0;
    }

    .tab-content {
      display: none;
      flex: 1;
      overflow-y: auto;
    }

    .tab-content.active {
      display: flex;
      flex-direction: column;
    }

    .diario-section {
      padding: 20px 24px;
    }

    .humor-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .humor-btn {

      border: 0.5px solid rgba(0,0,0,0.08);

    .diario-save-btn {
      margin-top: 10px;
      background: #A0A0A0;
      color: white;
      border: none;
      border-radius: 22px;
      padding: 10px 20px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      align-self: flex-end;
    }

    .diario-entry {
      background: white;
      border: 0.5px solid rgba(0,0,0,0.08);
      border-radius: 12px;

    .diario-entry-date {

      color: #8A8A8E;

    .diario-entry-text {

    .metas-section {

    .meta-card {

      padding: 12px 14px;

    .meta-titulo {

    }

    .meta-desc {
      font-size: 12px;

      margin-top: 3px;
    }

    .meta-categoria {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #F2F2F7;
      color: #636366;

      margin-top: 6px;
    }

    .add-meta-form {
      background: #F2F2F7;
      border-radius: 12px;

      margin-bottom: 16px;
    }

    .add-meta-form input,
    .add-meta-form select {
      width: 100%;

      border-radius: 8px;

      font-size: 13px;

      outline: none;
      background: white;
      color: #1C1C1E;
      margin-bottom: 8px;
    }

    .add-meta-btn {
      background: #A0A0A0;
      color: white;
      border: none;
      border-radius: 20px;

      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }

    .analise-btn {
      margin: 0 24px 12px;
      background: white;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 22px;
      padding: 10px 20px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      color: #1C1C1E;

    .analise-resultado {

  opacity: 0.45;

    * { box-sizing: border-box; margin: 0; padding: 0; }

    .relatorio-card {

  <script>
    async function toggleFeito(id, feito) {
  await fetch(`/eventos/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ feito })
  })
  const ev = eventos.find(e => e.id === id)
  if (ev) ev.feito = feito
  buildCalendar()
}
    async function deletarEvento(id) {
  await fetch(`/eventos/${id}`, { method: 'DELETE' })
  eventos = eventos.filter(ev => ev.id !== id)
  buildCalendar()
}
    const messages = document.getElementById('messages')
    const inputField = document.getElementById('inputField')
    const sendBtn = document.getElementById('sendBtn')
    const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb']
    const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez']

    let eventos = []

    async function pedirPermissaoNotificacao() {
      if (!('Notification' in window)) return
      if (Notification.permission === 'default') {
        await Notification.requestPermission()
      }
    }

    function notificar(titulo, corpo) {
      if (Notification.permission === 'granted') {
        new Notification(titulo, { body: corpo })
      }
    }

    function agendarAlerta(evento) {
      if (!evento.hora || !evento.data) return
      const dataHoraEvento = new Date(`${evento.data}T${evento.hora}:00`)
      const trintaMinutesAntes = new Date(dataHoraEvento.getTime() - 30 * 60 * 1000)
      const agora = new Date()
      const msAteAlerta = trintaMinutesAntes.getTime() - agora.getTime()
      if (msAteAlerta > 0) {
        setTimeout(() => {
          notificar(`⏰ Em 30 minutos: ${evento.titulo}`, `Hoje às ${evento.hora}`)
        }, msAteAlerta)
        console.log(`Alerta agendado para ${evento.titulo} em ${Math.round(msAteAlerta / 60000)} minutos`)
      }
    }
// TABS
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'))
      document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active')
      document.getElementById(`tab-${tab}`).classList.add('active')
    }

    // DIÁRIO
    let humorSelecionado = null

    function selecionarHumor(valor) {
      humorSelecionado = valor
      document.querySelectorAll('.humor-btn').forEach(btn => {
        btn.classList.toggle('selected', parseInt(btn.dataset.humor) === valor)
      })
    }

    async function salvarDiario() {
      const conteudo = document.getElementById('diarioTexto').value.trim()
      if (!conteudo) return
      await fetch('/diario', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          conteudo,
          humor: humorSelecionado,
          data: new Date().toISOString().split('T')[0]
        })
      })
      document.getElementById('diarioTexto').value = ''
      humorSelecionado = null
      document.querySelectorAll('.humor-btn').forEach(b => b.classList.remove('selected'))
      carregarDiario()
    }

    async function carregarDiario() {
      const resposta = await fetch('/diario')
      const entradas = await resposta.json()
      const container = document.getElementById('diarioEntradas')
      container.innerHTML = entradas.map(e => `
        <div class="diario-entry">
          <div class="diario-entry-date">${new Date(e.data + 'T00:00:00').toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' })} ${e.humor ? '— ' + ['😔','😕','😐','😊','🤩'][e.humor - 1] : ''}</div>
          <div class="diario-entry-text">${e.conteudo}</div>
        </div>
      `).join('')
    }

    // METAS
    async function salvarMeta() {
      const titulo = document.getElementById('metaTitulo').value.trim()
      if (!titulo) return
      await fetch('/metas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          titulo,
          descricao: document.getElementById('metaDescricao').value,
          categoria: document.getElementById('metaCategoria').value
        })
      })
      document.getElementById('metaTitulo').value = ''
      document.getElementById('metaDescricao').value = ''
      carregarMetas()
    }

    async function carregarMetas() {
      const resposta = await fetch('/metas')
      const metas = await resposta.json()
      const container = document.getElementById('listaMetasContainer')
      container.innerHTML = metas.map(m => `
        <div class="meta-card">
          <div class="meta-titulo">${m.titulo}</div>
          ${m.descricao ? `<div class="meta-desc">${m.descricao}</div>` : ''}
          ${m.categoria ? `<span class="meta-categoria">${m.categoria}</span>` : ''}
        </div>
      `).join('')
    }

    async function gerarAnalise() {
      const div = document.getElementById('analiseResultado')
      div.style.display = 'block'
      div.textContent = 'Analisando...'
      const resposta = await fetch('/analise')
      const dados = await resposta.json()
      div.innerHTML = dados.conteudo
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>')
    }

    carregarDiario()
    carregarMetas()
    async function carregarEventos() {
      const resposta = await fetch('/eventos')
      eventos = await resposta.json()
      eventos.forEach(ev => agendarAlerta(ev))
      buildCalendar()
    }

    function addBubble(text, sender) {
      const bubble = document.createElement('div')
      bubble.classList.add('bubble', sender)
      bubble.textContent = text
      messages.appendChild(bubble)
      messages.scrollTop = messages.scrollHeight
    }

async function sendMessage() {
  const text = inputField.value.trim()
  if (!text) return
  addBubble(text, 'user')
  inputField.value = ''
  addBubble('...', 'maya')
  try {
    const resposta = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mensagem: text, eventos })
    })
    const dados = await resposta.json()
    messages.lastChild.remove()

    if (dados.conflito) {
      addBubble(`⚠️ ${dados.mensagem_conflito}`, 'maya')
      return
    }

    if (dados.tipo === 'delete') {
      const evento = eventos.find(ev =>
        ev.titulo.toLowerCase().includes(dados.titulo.toLowerCase())
      )
      if (evento) {
        await deletarEvento(evento.id)
        addBubble(dados.confirmacao, 'maya')
      } else {
        addBubble('Não encontrei esse evento na agenda.', 'maya')
      }
      return
    }

    if (dados.tipo === 'editar') {
      const evento = eventos.find(ev =>
        ev.titulo.toLowerCase().includes(dados.titulo_original.toLowerCase())
      )
      if (evento) {
        await fetch(`/eventos/${evento.id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            titulo: dados.titulo,
            data: dados.data,
            hora: dados.hora
          })
        })
        evento.titulo = dados.titulo
        evento.data = dados.data
        evento.hora = dados.hora
        addBubble(dados.confirmacao, 'maya')
        buildCalendar()
      } else {
        addBubble('Não encontrei esse evento na agenda.', 'maya')
      }
      return
    }

    if (dados.lista) {
      eventos.push(...dados.lista)
      dados.lista.forEach(ev => agendarAlerta(ev))
    }

    addBubble(dados.confirmacao, 'maya')
    buildCalendar()

  } catch (erro) {
    messages.lastChild.remove()
    addBubble('Ops, algo deu errado. Tenta de novo.', 'maya')
    console.error(erro)
  }
}
    function buildCalendar() {
      const grid = document.getElementById('weekGrid')
      const weekRange = document.getElementById('weekRange')
      grid.innerHTML = ''
      const hoje = new Date()
      const domingo = new Date(hoje)
      domingo.setDate(hoje.getDate() - hoje.getDay())
      const sabado = new Date(domingo)
      sabado.setDate(domingo.getDate() + 6)
      weekRange.textContent = `${domingo.getDate()} ${meses[domingo.getMonth()]} – ${sabado.getDate()} ${meses[sabado.getMonth()]}`
      for (let i = 0; i < 7; i++) {
        const dia = new Date(domingo)
        dia.setDate(domingo.getDate() + i)
        const coluna = document.createElement('div')
        coluna.classList.add('day-column')
        const nomeDia = document.createElement('div')
        nomeDia.classList.add('day-name')
        nomeDia.textContent = diasSemana[i]
        const numeroDia = document.createElement('div')
        numeroDia.classList.add('day-number')
        numeroDia.textContent = dia.getDate()
        if (dia.toDateString() === hoje.toDateString()) {
          numeroDia.classList.add('today')
        }
        coluna.appendChild(nomeDia)
        coluna.appendChild(numeroDia)
        const eventosDoDia = eventos.filter(ev => {
          if (!ev.data) return false
          const dataEvento = new Date(ev.data + 'T00:00:00')
          return dataEvento.toDateString() === dia.toDateString()
        })
        eventosDoDia.forEach(ev => {
  const pill = document.createElement('div')
  pill.classList.add('event-pill', ev.tipo)
  if (ev.feito) pill.classList.add('feito')

  const check = document.createElement('span')
  check.classList.add('pill-check')
  check.textContent = ev.feito ? '✓' : '○'
  if (ev.feito) check.classList.add('checked')
  check.addEventListener('click', (e) => {
    e.stopPropagation()
    toggleFeito(ev.id, !ev.feito)
  })

  const deleteBtn = document.createElement('span')
  deleteBtn.classList.add('pill-delete')
  deleteBtn.textContent = '×'
  deleteBtn.addEventListener('click', (e) => {
    e.stopPropagation()
    deletarEvento(ev.id)
  })

  const conteudo = document.createElement('span')
  if (ev.hora) {
    conteudo.innerHTML = `<span class="pill-time">${ev.hora}</span>${ev.titulo}`
  } else {
    conteudo.textContent = ev.titulo
  }

  pill.appendChild(check)
  pill.appendChild(conteudo)
  pill.appendChild(deleteBtn)
  coluna.appendChild(pill)
      })

      grid.appendChild(coluna)
    }
  }

    async function carregarRelatorio() {
      try {
        const resposta = await fetch('/relatorios')
        const dados = await resposta.json()
        if (dados && dados.length > 0) {
          mostrarRelatorio(dados[0].conteudo)
        }
      } catch (e) {
        console.log('Sem relatórios ainda')
      }
    }

    function mostrarRelatorio(conteudo) {
    const div = document.getElementById('relatorioConteudo')
    const formatado = conteudo
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>')
    div.innerHTML = `<div class="relatorio-card">${formatado}</div>`
    }

    async function gerarRelatorioAgora() {
      const div = document.getElementById('relatorioConteudo')
      div.innerHTML = '<div class="relatorio-vazio">Analisando sua semana...</div>'
      const resposta = await fetch('/gerar-relatorio')
      const dados = await resposta.json()
      if (dados.conteudo) {
        mostrarRelatorio(dados.conteudo)
      }
    }

    sendBtn.addEventListener('click', sendMessage)
    inputField.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage()
    })

    carregarEventos()
    carregarRelatorio()
    pedirPermissaoNotificacao()

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('Service Worker registrado'))
        .catch(err => console.log('Erro no SW:', err))
    }
  </script>
