<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maya</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Maya">
  <style>
    .event-pill.feito {
  opacity: 0.45;
  text-decoration: line-through;
}

.pill-check {
  margin-right: 4px;
  cursor: pointer;
  font-size: 11px;
  color: #AEAEB2;
}

.pill-check:hover {
  color: #34C759;
}

.pill-check.checked {
  color: #34C759;
}
    .pill-delete {
  margin-left: 4px;
  color: #AEAEB2;
  cursor: pointer;
  font-size: 12px;
}

.pill-delete:hover {
  color: #FF3B30;
}
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FAFAFA;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .header {
      padding: 20px 24px 16px;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      background: white;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1C1C1E;
      letter-spacing: -0.3px;
    }

    .header p {
      font-size: 13px;
      color: #8A8A8E;
      margin-top: 2px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 200px;
    }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
    }

    .bubble.user {
      background: #A0A0A0;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.maya {
      background: white;
      color: #1C1C1E;
      align-self: flex-start;
      border: 0.5px solid rgba(0,0,0,0.08);
      border-bottom-left-radius: 4px;
    }

    .input-area {
      padding: 12px 24px 24px;
      background: white;
      border-top: 0.5px solid rgba(0,0,0,0.08);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      background: #F2F2F7;
      color: #1C1C1E;
    }

    .input-area input::placeholder { color: #AEAEB2; }

    .input-area button {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #A0A0A0;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .input-area button svg { width: 16px; height: 16px; fill: white; }

    .calendar {
      padding: 20px 24px;
      border-top: 0.5px solid rgba(0,0,0,0.08);
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .calendar-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: #1C1C1E;
    }

    .calendar-header span {
      font-size: 12px;
      color: #8A8A8E;
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day-column {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .day-name {
      font-size: 11px;
      font-weight: 500;
      color: #8A8A8E;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }

    .day-number {
      font-size: 13px;
      font-weight: 500;
      color: #1C1C1E;
      text-align: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 4px;
    }

    .day-number.today { background: #A0A0A0; color: white; }

    .event-pill {
      background: #F2F2F7;
      border: 0.5px solid rgba(0,0,0,0.08);
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 11px;
      color: #1C1C1E;
      line-height: 1.3;
    }

    .event-pill .pill-time {
      font-size: 10px;
      color: #8A8A8E;
      display: block;
    }

    .event-pill.task {
      border-left: 2px solid #A0A0A0;
      border-radius: 0 6px 6px 0;
    }

    .event-pill.event {
      border-left: 2px solid #1C1C1E;
      border-radius: 0 6px 6px 0;
    }

    .relatorio-section {
      padding: 20px 24px;
      border-top: 0.5px solid rgba(0,0,0,0.08);
    }

    .relatorio-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .relatorio-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: #1C1C1E;
    }

    .relatorio-btn {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 0.5px solid rgba(0,0,0,0.12);
      background: transparent;
      color: #8A8A8E;
      cursor: pointer;
      font-family: inherit;
    }

    .relatorio-card {
      background: white;
      border: 0.5px solid rgba(0,0,0,0.08);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      color: #1C1C1E;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .relatorio-vazio {
      font-size: 13px;
      color: #AEAEB2;
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Maya</h1>
    <p>Sua agenda inteligente</p>
  </div>

  <div class="messages" id="messages">
    <div class="bubble maya">
      Oi! Sou a Maya. Me diga um compromisso, tarefa ou lembrete — pode ser do jeito que você fala mesmo.
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="inputField" placeholder="Ex: reunião quinta às 14h..." />
    <button id="sendBtn">
      <svg viewBox="0 0 24 24">
        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
      </svg>
    </button>
  </div>

  <div class="calendar">
    <div class="calendar-header">
      <h2>Esta semana</h2>
      <span id="weekRange"></span>
    </div>
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <div class="relatorio-section">
    <div class="relatorio-header">
      <h2>Relatório da semana</h2>
      <button class="relatorio-btn" onclick="gerarRelatorioAgora()">Gerar agora</button>
    </div>
    <div id="relatorioConteudo">
      <div class="relatorio-vazio">Nenhum relatório ainda. Clica em "Gerar agora" para analisar sua semana.</div>
    </div>
  </div>

  <script>
    async function toggleFeito(id, feito) {
  await fetch(`/eventos/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ feito })
  })
  const ev = eventos.find(e => e.id === id)
  if (ev) ev.feito = feito
  buildCalendar()
}
    async function deletarEvento(id) {
  await fetch(`/eventos/${id}`, { method: 'DELETE' })
  eventos = eventos.filter(ev => ev.id !== id)
  buildCalendar()
}
    const messages = document.getElementById('messages')
    const inputField = document.getElementById('inputField')
    const sendBtn = document.getElementById('sendBtn')
    const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb']
    const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez']

    let eventos = []

    async function pedirPermissaoNotificacao() {
      if (!('Notification' in window)) return
      if (Notification.permission === 'default') {
        await Notification.requestPermission()
      }
    }

    function notificar(titulo, corpo) {
      if (Notification.permission === 'granted') {
        new Notification(titulo, { body: corpo })
      }
    }

    function agendarAlerta(evento) {
      if (!evento.hora || !evento.data) return
      const dataHoraEvento = new Date(`${evento.data}T${evento.hora}:00`)
      const trintaMinutesAntes = new Date(dataHoraEvento.getTime() - 30 * 60 * 1000)
      const agora = new Date()
      const msAteAlerta = trintaMinutesAntes.getTime() - agora.getTime()
      if (msAteAlerta > 0) {
        setTimeout(() => {
          notificar(`⏰ Em 30 minutos: ${evento.titulo}`, `Hoje às ${evento.hora}`)
        }, msAteAlerta)
        console.log(`Alerta agendado para ${evento.titulo} em ${Math.round(msAteAlerta / 60000)} minutos`)
      }
    }

    async function carregarEventos() {
      const resposta = await fetch('/eventos')
      eventos = await resposta.json()
      eventos.forEach(ev => agendarAlerta(ev))
      buildCalendar()
    }

    function addBubble(text, sender) {
      const bubble = document.createElement('div')
      bubble.classList.add('bubble', sender)
      bubble.textContent = text
      messages.appendChild(bubble)
      messages.scrollTop = messages.scrollHeight
    }

    async function sendMessage() {
      const text = inputField.value.trim()
      if (!text) return
      addBubble(text, 'user')
      inputField.value = ''
      addBubble('...', 'maya')
      try {
        const resposta = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mensagem: text, eventos })
        })
        const dados = await resposta.json()
        messages.lastChild.remove()
        if (dados.conflito) {
          addBubble(`⚠️ ${dados.mensagem_conflito}`, 'maya')
          return
        }
        if (dados.lista) {
          eventos.push(...dados.lista)
          dados.lista.forEach(ev => agendarAlerta(ev))
        }
        addBubble(dados.confirmacao, 'maya')
        buildCalendar()
      } catch (erro) {
        messages.lastChild.remove()
        addBubble('Ops, algo deu errado. Tenta de novo.', 'maya')
        console.error(erro)
      }
    }

    function buildCalendar() {
      const grid = document.getElementById('weekGrid')
      const weekRange = document.getElementById('weekRange')
      grid.innerHTML = ''
      const hoje = new Date()
      const domingo = new Date(hoje)
      domingo.setDate(hoje.getDate() - hoje.getDay())
      const sabado = new Date(domingo)
      sabado.setDate(domingo.getDate() + 6)
      weekRange.textContent = `${domingo.getDate()} ${meses[domingo.getMonth()]} – ${sabado.getDate()} ${meses[sabado.getMonth()]}`
      for (let i = 0; i < 7; i++) {
        const dia = new Date(domingo)
        dia.setDate(domingo.getDate() + i)
        const coluna = document.createElement('div')
        coluna.classList.add('day-column')
        const nomeDia = document.createElement('div')
        nomeDia.classList.add('day-name')
        nomeDia.textContent = diasSemana[i]
        const numeroDia = document.createElement('div')
        numeroDia.classList.add('day-number')
        numeroDia.textContent = dia.getDate()
        if (dia.toDateString() === hoje.toDateString()) {
          numeroDia.classList.add('today')
        }
        coluna.appendChild(nomeDia)
        coluna.appendChild(numeroDia)
        const eventosDoDia = eventos.filter(ev => {
          if (!ev.data) return false
          const dataEvento = new Date(ev.data + 'T00:00:00')
          return dataEvento.toDateString() === dia.toDateString()
        })
        eventosDoDia.forEach(ev => {
  const pill = document.createElement('div')
  pill.classList.add('event-pill', ev.tipo)
  if (ev.feito) pill.classList.add('feito')

  const check = document.createElement('span')
  check.classList.add('pill-check')
  check.textContent = ev.feito ? '✓' : '○'
  if (ev.feito) check.classList.add('checked')
  check.addEventListener('click', (e) => {
    e.stopPropagation()
    toggleFeito(ev.id, !ev.feito)
  })

  const deleteBtn = document.createElement('span')
  deleteBtn.classList.add('pill-delete')
  deleteBtn.textContent = '×'
  deleteBtn.addEventListener('click', (e) => {
    e.stopPropagation()
    deletarEvento(ev.id)
  })

  const conteudo = document.createElement('span')
  if (ev.hora) {
    conteudo.innerHTML = `<span class="pill-time">${ev.hora}</span>${ev.titulo}`
  } else {
    conteudo.textContent = ev.titulo
  }

  pill.appendChild(check)
  pill.appendChild(conteudo)
  pill.appendChild(deleteBtn)
  coluna.appendChild(pill)
      })

      grid.appendChild(coluna)
    }
  }

    async function carregarRelatorio() {
      try {
        const resposta = await fetch('/relatorios')
        const dados = await resposta.json()
        if (dados && dados.length > 0) {
          mostrarRelatorio(dados[0].conteudo)
        }
      } catch (e) {
        console.log('Sem relatórios ainda')
      }
    }

    function mostrarRelatorio(conteudo) {
    const div = document.getElementById('relatorioConteudo')
    const formatado = conteudo
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>')
    div.innerHTML = `<div class="relatorio-card">${formatado}</div>`
    }

    async function gerarRelatorioAgora() {
      const div = document.getElementById('relatorioConteudo')
      div.innerHTML = '<div class="relatorio-vazio">Analisando sua semana...</div>'
      const resposta = await fetch('/gerar-relatorio')
      const dados = await resposta.json()
      if (dados.conteudo) {
        mostrarRelatorio(dados.conteudo)
      }
    }

    sendBtn.addEventListener('click', sendMessage)
    inputField.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage()
    })

    carregarEventos()
    carregarRelatorio()
    pedirPermissaoNotificacao()

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('Service Worker registrado'))
        .catch(err => console.log('Erro no SW:', err))
    }
  </script>

</body>
</html>
